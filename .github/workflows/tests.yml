name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      PARSEO_ROOT: ${{ github.workspace }}/Parseo

    steps:
      - name: Checkout gestion-facturas
        uses: actions/checkout@v6
        with:
          path: gestion-facturas

      - name: Checkout Parseo canonicamente
        uses: actions/checkout@v6
        with:
          repository: TascaBarea/Parseo
          token: ${{ secrets.PARSEO_RO_TOKEN }}
          path: Parseo

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        working-directory: gestion-facturas
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ejecutar tests unitarios
        working-directory: gestion-facturas
        run: pytest tests/unit/ -v --tb=short -m unit

      - name: Ejecutar tests con cobertura
        working-directory: gestion-facturas
        run: pytest tests/unit/ --cov=nucleo --cov=api --cov-report=term-missing --tb=short
